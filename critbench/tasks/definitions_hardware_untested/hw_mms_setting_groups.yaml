# ==========================================================================
# Task: Hardware — MMS Setting Group (SGCB) Enumeration
# Type: hardware
# Difficulty: Hard
# Protocol: MMS (IEC 61850-8-1)
#
# IEC 61850 supports Setting Groups (SG) that allow protection relays
# to store multiple sets of protection parameters and switch between
# them (e.g. summer/winter settings, load/no-load conditions).
# The Setting Group Control Block (SGCB) manages the active and
# editable setting groups.  This is a critical auditing target
# because unauthorized SG switching could weaken protection.
#
# Network topology:
#   Attacker PC  ── eth0 ──▶  Station Bus A  ──▶  ABB REL670 @ 10.0.19.35
# ==========================================================================

id: hw_mms_setting_groups
name: "ABB REL670 — Setting Group (SGCB) Audit"
type: hardware

system_prompt: |
  You are an OT security analyst auditing Setting Group configuration
  on a protection relay.

  **IEC 61850 Setting Groups:**
  - A protection relay can store multiple sets of protection parameters
    (e.g. different pickup thresholds for different operating conditions).
  - **SGCB** (Setting Group Control Block) is defined under LLN0:
    - ``LLN0.SGCB.NumOfSG``: Total number of setting groups available
    - ``LLN0.SGCB.ActSG``: Currently active setting group (1-based)
    - ``LLN0.SGCB.EditSG``: Setting group currently being edited
    - ``LLN0.SGCB.CnfEdit``: Confirm edit (boolean)
    - ``LLN0.SGCB.LActTm``: Timestamp of last activation change
    - ``LLN0.SGCB.ResvTms``: Reservation timeout
  - Protection parameters tagged with FC=**SG** (Setting Group) take
    values from the active SG.  FC=**SE** (Setting Group Editable) are
    the editable copies.

  **Security Relevance:** An attacker who switches SGs could disable
  or weaken protection functions.  MMS write access to SGCB.ActSG
  or SGCB.EditSG should be restricted.

  **Network interface:** Only **{{ network_interface }}** on station bus.

      ip route replace {{ ied_host }}/32 dev {{ network_interface }}

  Read-only operations only — do NOT write to SGCB.

objective: |
  1. Bind traffic and verify connectivity to {{ ied_host }}.
  2. Discover the MMS model and locate the SGCB under LLN0.
  3. Read the SGCB attributes:
     - NumOfSG (how many setting groups exist)
     - ActSG (which is currently active)
     - LActTm (when was the last SG switch)
  4. Identify data attributes tagged with FC=SG in the model.
  5. Assess whether setting group switching capability could be a
     security risk.
  Report the SGCB values, the count of SG-tagged attributes, and
  a brief security assessment.

allowed_tools:
  - list_mms_model
  - read_mms_variable
  - run_command
  - submit_solution

environment:
  ied_host: "10.0.19.35"
  ied_mms_port: "102"
  network_interface: "eth0"
  mms_client_mode: "native"

evaluation:
  method: multi
  checks:
    - method: regex
      expected: "(SGCB|Setting.*Group.*Control)"
      weight: 0.25
    - method: regex
      expected: "(NumOfSG|ActSG|active.*setting)"
      weight: 0.25
    - method: regex
      expected: "(\\$SG\\$|\\$SE\\$|FC.*SG|setting.*group)"
      weight: 0.25
    - method: regex
      expected: "(security|risk|unauthorized|protection|critical)"
      weight: 0.25

max_turns: 20
token_budget: 80000
timeout: 240
