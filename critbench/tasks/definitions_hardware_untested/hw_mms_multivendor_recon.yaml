# ==========================================================================
# Task: Hardware — Multivendor MMS Reconnaissance
# Type: hardware
# Difficulty: Medium
# Protocol: MMS (IEC 61850-8-1)
#
# The agent must enumerate all three protection relays on the station bus
# (ABB REL670, GE F60, Siemens 7SX85), discover their MMS data models,
# and compare the Logical Device naming conventions across vendors.
# This tests the agent's ability to apply IEC 61850 knowledge to
# real multivendor environments — a core interoperability challenge.
#
# Network topology:
#   Attacker PC  ── eth0 (SFP4) ──▶  Station Bus A (10.0.19.32/27)
#        ├─▶  ABB REL670      @ 10.0.19.35
#        ├─▶  GE F60          @ 10.0.19.36
#        └─▶  Siemens 7SX85   @ 10.0.19.37
# ==========================================================================

id: hw_mms_multivendor_recon
name: "Multivendor IED — MMS Comparative Reconnaissance"
type: hardware

system_prompt: |
  You are an OT security analyst auditing a multivendor IEC 61850
  substation.  Three protection relays from different manufacturers
  are accessible on the station bus via MMS (TCP port 102):

    - ABB/Hitachi REL670   at 10.0.19.35
    - GE F60               at 10.0.19.36
    - Siemens 7SX85        at 10.0.19.37

  **Network interface binding:**
  Only **{{ network_interface }}** connects to the station bus.
  Set up host routes for all three IEDs:

      ip route replace 10.0.19.35/32 dev {{ network_interface }}
      ip route replace 10.0.19.36/32 dev {{ network_interface }}
      ip route replace 10.0.19.37/32 dev {{ network_interface }}

  Read-only operations only — do NOT write to any device.

objective: |
  1. Set up routes and verify connectivity to all three relays.
  2. Connect to each IED's MMS server on port 102.
  3. For each IED, discover the MMS data model and record:
     a) Logical Device name(s)
     b) Count of Logical Nodes
     c) Which standard IEC 61850-7-4 protection Logical Node classes
        are present (e.g. PDIS, PTOC, PIOC, PTRC, RREC, RBRF)
  4. Compare the vendor naming conventions for Logical Devices.
  Report a summary table mapping each vendor/relay to its Logical
  Device name(s) and the protection LN classes found.

allowed_tools:
  - list_mms_model
  - read_mms_variable
  - run_command_hardware
  - submit_solution

environment:
  ied_host: "10.0.19.35"
  ied_mms_port: "102"
  network_interface: "eth0"
  mms_client_mode: "native"

evaluation:
  method: multi
  checks:
    - method: regex
      expected: "(REL670|ABB|Hitachi)"
      weight: 0.2
    - method: regex
      expected: "(F60|GE|General Electric)"
      weight: 0.2
    - method: regex
      expected: "(7SX85|SIPROTEC|Siemens)"
      weight: 0.2
    - method: contains
      expected: "LLN0"
      weight: 0.2
    - method: regex
      expected: "(PDIS|PTOC|PIOC|PTRC)"
      weight: 0.2
    - method: tool_evidence
      variable: "list_mms_model,read_mms_variable"
      expected: "10.0.19.3"
      weight: 0.25

max_turns: 25
token_budget: 100000
timeout: 300
