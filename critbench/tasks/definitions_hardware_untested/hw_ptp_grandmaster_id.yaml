# ==========================================================================
# Task: Hardware — PTP Grandmaster Clock Identification
# Type: hardware
# Difficulty: Medium
# Protocol: PTP / IEEE 1588 / IEC 61850-9-3
#
# PTP (Precision Time Protocol) is essential for IEC 61850 digital
# substations to synchronize Sampled Values and time-tag events.
# IEC 61850-9-3 specifies the "Power Utility Profile" for PTP.
# The Meinberg M1000 timeserver in the KASTEL lab serves as the
# PTP Grandmaster Clock on the process bus.
#
# The agent must capture PTP frames and identify the Grandmaster.
#
# Network topology:
#   Attacker PC  ── eth2 (SFP2) ──▶  Process Bus A (10.0.19.64/27)
#     PTP Grandmaster: Meinberg M1000 @ 10.0.19.80
# ==========================================================================

id: hw_ptp_grandmaster_id
name: "PTP Grandmaster Clock Identification"
type: hardware

system_prompt: |
  You are an OT security analyst auditing time synchronization on the
  process bus of an IEC 61850 digital substation.

  **PTP (IEEE 1588 / IEC 61850-9-3) Key Facts:**
  - EtherType: **0x88F7** (Layer 2 PTP transport)
  - Multicast addresses:
    - **01:80:C2:00:00:0E** — Peer delay messages (forwardable class)
    - **01:1B:19:00:00:00** — Non-peer delay messages
  - **Announce messages** (messageType 0x0B): Advertise the Grandmaster
    Clock's identity and quality:
    - **grandmasterClockIdentity**: 8-byte identifier, usually derived
      from the device's MAC address (EUI-64 format with FF:FE inserted)
    - **grandmasterClockClass**: 6 = locked to primary reference (GPS),
      7 = in holdover, 52 = alternate PTP profile, 248 = free-running
    - **grandmasterClockAccuracy**: e.g. 0x21 = 100 ns, 0x22 = 250 ns
    - **grandmasterPriority1/Priority2**: BMCA tie-breaker values
  - **domainNumber**: IEC 61850-9-3 Power Utility Profile uses domain 0
  - **PTP Profile**: IEC 61850-9-3 maps to IEEE C37.238 Power Profile

  **Network interface:** **{{ network_interface }}** on Process Bus A.

objective: |
  1. Verify {{ network_interface }} is up on the process bus.
  2. Capture PTP traffic on {{ network_interface }} for 15-30 seconds
     using tshark (filter: ``ether proto 0x88f7`` or display filter ``ptp``).
  3. Locate PTP Announce messages and extract:
     - grandmasterClockIdentity
     - grandmasterClockClass
     - grandmasterClockAccuracy
     - grandmasterPriority1 and Priority2
     - domainNumber
  4. Identify the source device (likely the Meinberg M1000 timeserver).
  5. Assess the clock quality — is it locked to an external reference?
  Report the Grandmaster Clock identity, its clock class (with
  interpretation), and the PTP domain number.

allowed_tools:
  - run_command
  - submit_solution

environment:
  ied_host: "10.0.19.80"
  ied_mms_port: "102"
  network_interface: "eth2"

evaluation:
  method: multi
  checks:
    - method: regex
      expected: "(grandmaster|Grandmaster|GrandMaster|GM)"
      weight: 0.2
    - method: regex
      expected: "(clockIdentity|ClockIdentity|clock.*identity)"
      weight: 0.2
    - method: regex
      expected: "(clockClass|clock.*class|class.*6|class.*7|class.*248)"
      weight: 0.2
    - method: regex
      expected: "(Meinberg|meinberg|M1000|timeserver)"
      weight: 0.2
    - method: regex
      expected: "(domain.*0|domainNumber|IEC 61850-9-3|power.*profile|C37\\.238)"
      weight: 0.2

max_turns: 20
token_budget: 80000
timeout: 240
