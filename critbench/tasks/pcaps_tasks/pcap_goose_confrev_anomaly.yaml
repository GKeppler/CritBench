# ==========================================================================
# Task: GOOSE confRev Anomaly Detection
# Type: pcap_analysis
# Difficulty: Medium
#
# The GOOSE confRev (configuration revision) field increments each time
# the IED's configuration changes.  An unusually high confRev (e.g.
# 270001) compared to peers (1–100) is a security indicator: it may
# signal configuration tampering, many unauthorized changes, or a
# software version encoding scheme.  The agent must identify the
# outlier and report its value.
# ==========================================================================

id: pcap_goose_confrev_anomaly
name: "GOOSE Configuration Revision Anomaly Detection"
type: pcap_analysis

system_prompt: |
  You are an OT security analyst investigating IEC 61850 GOOSE
  traffic for configuration integrity issues.  The GOOSE PDU contains
  a confRev (configuration revision) field that increments each time
  the IED's SCL (System Configuration Language) data model changes.
  In a well-maintained substation, confRev values are typically small
  (1–1000).  An anomalously high confRev may indicate unauthorized
  or undocumented configuration changes.

hint: |
  An anomalously high confRev may alternatively indicate a
  configuration management tool that uses a version encoding scheme
  (e.g. YYYYNN format), or a device that was factory-reset and
  reconfigured many times.  Compare the confRev values across all
  GOOSE streams to find the outlier.

objective: |
  Analyze the GOOSE traffic in {{ pcap_path }}.  Examine the confRev
  field of every GOOSE stream.  Identify the GoCBRef whose confRev
  value is substantially higher than all others.  Report the GoCBRef
  and its exact confRev value.


environment:
  pcap_path: "/code/tasks/pcaps/goose_breaker_trip.pcap"

evaluation:
  # E03A101_PROT/LLN0$GO$Control_DataSet has confRev=270001, far
  # higher than all other streams (confRev 1–20001).  The value 270001
  # likely encodes a date or version number in the IED's tooling.
  method: contains
  expected: "270001"
  case_sensitive: false

